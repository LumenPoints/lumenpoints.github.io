<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LumenPoints — Illuminate every point of your health.</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="LumenPoints unifies Body, Skin, Mind, Blood, and Trends into a single, legible system for your whole household." />
<meta property="og:title" content="LumenPoints — Illuminate every point of your health." />
<meta property="og:description" content="LumenPoints unifies Body, Skin, Mind, Blood, and Trends into a single, legible system for your whole household." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://lumenpoints.com" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #161C19; }
  body { font-family: "Instrument Sans", system-ui, sans-serif; color: #EDE6D6; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  #root:empty::before { content: ""; position: fixed; inset: 0; background: #161C19; }

  /* ============================================
     DESKTOP FLUID SCALING (>900px)
     The design is authored at a fixed 1440px. To make
     it flex nicely on any screen, we use CSS `zoom` on
     the root — supported in all modern browsers
     (Chrome/Edge/Safari/Firefox 126+) and scales layout
     metrics properly so clicks, scroll, anchor links all
     still work correctly.
     ============================================ */
  @media (min-width: 901px) {
    html, body { overflow-x: hidden; }
    #root {
      zoom: 1;  /* default, overridden below */
    }
  }
  /* Small laptop (1280 and under but above mobile): shrink */
  @media (min-width: 901px) and (max-width: 1279px) {
    #root { zoom: 0.82; }
  }
  /* Standard laptop (1280–1599): slight shrink */
  @media (min-width: 1280px) and (max-width: 1599px) {
    #root { zoom: 0.92; }
  }
  /* 1600–1919: near-native */
  @media (min-width: 1600px) and (max-width: 1919px) {
    #root { zoom: 1.05; }
  }
  /* 1920–2399: scale up */
  @media (min-width: 1920px) and (max-width: 2399px) {
    #root { zoom: 1.2; }
  }
  /* Huge monitors (2400+): cap scaling */
  @media (min-width: 2400px) {
    #root { zoom: 1.4; }
  }

  /* ============================================
     MOBILE RESPONSIVE OVERRIDES (≤900px)
     Page is designed at 1440px. On mobile we:
     - unlock width
     - stack 2-col grids
     - shrink fixed paddings
     - shrink display type
     - make buttons & tap targets bigger
     ============================================ */
  @media (max-width: 900px) {
    /* Root page: unlock fixed 1440 width */
    #root > div[style*="width: 1440"],
    #root > div {
      width: 100% !important;
      min-width: 0 !important;
      max-width: 100vw !important;
      overflow-x: hidden !important;
    }

    /* Nav: stack vertically, shrink, center */
    #root > div > div:first-child {
      flex-wrap: wrap !important;
      padding: 20px 20px !important;
      gap: 16px !important;
      justify-content: center !important;
      text-align: center !important;
    }
    #root > div > div:first-child > div:first-child {
      gap: 10px !important;
    }
    #root > div > div:first-child > div:first-child svg {
      width: 40px !important; height: 40px !important;
    }
    #root > div > div:first-child > div:first-child > div {
      font-size: 30px !important;
    }
    #root > div > div:first-child > div:nth-child(2) {
      display: flex !important;
      flex-wrap: nowrap !important;
      gap: 14px !important;
      font-size: 10px !important;
      letter-spacing: 0.12em !important;
      justify-content: center !important;
      align-items: center !important;
      width: 100% !important;
      padding: 0 8px !important;
    }
    #root > div > div:first-child > div:nth-child(2) a {
      white-space: nowrap !important;
      flex-shrink: 0 !important;
    }
    #root > div > div:first-child > a:last-child {
      font-size: 12px !important;
      padding: 10px 18px !important;
    }

    /* All section paddings: tighter */
    #root > div > div {
      padding-left: 22px !important;
      padding-right: 22px !important;
    }

    /* Any 2-column grid → single column */
    #root div[style*="grid-template-columns"] {
      grid-template-columns: 1fr !important;
      gap: 40px !important;
    }

    /* Display serif headlines: scale down */
    #root h1, #root h2 {
      font-size: clamp(40px, 11vw, 72px) !important;
      line-height: 1.05 !important;
      letter-spacing: -0.01em !important;
    }
    #root h3 {
      font-size: clamp(32px, 8vw, 48px) !important;
      line-height: 1.1 !important;
    }

    /* Massive display type (wordmark, founding, waitlist) */
    #root div[style*="font-size: 200px"],
    #root div[style*="font-size: 180px"],
    #root div[style*="font-size: 160px"],
    #root h2[style*="font-size: 108"],
    #root h2[style*="font-size: 100"] {
      font-size: clamp(50px, 14vw, 96px) !important;
      line-height: 1 !important;
    }

    /* Body text: bump base size for readability */
    #root p, #root div[style*="fontSize: 19"],
    #root div[style*="font-size: 19"],
    #root div[style*="font-size: 20"],
    #root div[style*="font-size: 17"] {
      font-size: 16px !important;
      max-width: 100% !important;
    }

    /* Mono labels: slightly smaller letterspacing on mobile */
    #root span[style*="letter-spacing: 0.22em"],
    #root span[style*="letter-spacing: 0.18em"],
    #root div[style*="letter-spacing: 0.22em"] {
      letter-spacing: 0.14em !important;
    }

    /* Images: reset aspect ratio so they don't dominate */
    #root div[style*="aspect-ratio: 4 / 5"] {
      max-width: 100% !important;
    }

    /* Big circular compass SVG in hero: cap size */
    #root svg[viewBox="0 0 500 500"] {
      max-width: 80vw !important;
      margin: 0 auto !important;
    }

    /* Buttons/CTAs: bigger tap targets, full-width on mobile */
    #root a[href="#founding"],
    #root a[href="#waitlist"] {
      padding: 16px 24px !important;
      font-size: 13px !important;
      width: auto !important;
      display: inline-block !important;
    }
    #root div[style*="display: flex"][style*="gap: 16"] {
      flex-wrap: wrap !important;
      gap: 12px !important;
    }

    /* Footer: stack */
    #root > div > div:last-child {
      flex-direction: column !important;
      gap: 24px !important;
      align-items: flex-start !important;
    }

    /* Section vertical padding: less aggressive */
    #root > div > div[style*="padding: 120px"],
    #root > div > div[style*="padding: 130px"],
    #root > div > div[style*="padding: 140px"],
    #root > div > div[style*="padding: 110px"],
    #root > div > div[style*="padding: 180px"] {
      padding-top: 64px !important;
      padding-bottom: 64px !important;
    }

    /* Waitlist form: stack input + button */
    #root form {
      flex-direction: column !important;
      gap: 20px !important;
      max-width: 100% !important;
    }
    #root form input[type="email"] {
      font-size: 20px !important;
      width: 100% !important;
      padding: 12px 0 !important;
    }
    #root form button {
      width: 100% !important;
      padding: 14px !important;
      font-size: 14px !important;
      border: 1px solid #C9A978 !important;
    }

    /* Founding price card: less padding */
    #root div[style*="padding: 40"] {
      padding: 24px !important;
    }

    /* Dimension label circles - keep visible */
    #root span[style*="border-radius: 50%"][style*="width: 20"] {
      flex-shrink: 0;
    }
  }

  /* Small phones */
  @media (max-width: 480px) {
    #root h1, #root h2 {
      font-size: clamp(36px, 10vw, 56px) !important;
    }
    #root > div > div {
      padding-left: 18px !important;
      padding-right: 18px !important;
    }
  }

  /* Smooth scroll for anchor links */
  html { scroll-behavior: smooth; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

<script src="app.bundle.js?v=11"></script>
</body>
</html>
